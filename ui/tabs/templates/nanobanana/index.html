<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ── 테마 변수 (다크 기본) ── */
:root{
  --bg-body:#0d0d0d;
  --bg-sidebar:#0d0d0d;
  --bg-topbar:#0d0d0d;
  --bg-surface:#1a1a2e;
  --bg-surface-hover:#222240;
  --bg-input:#1e1e2e;
  --bg-card:#1a1a2a;
  --border:#1e1e2e;
  --border-mid:#2a2a3a;
  --border-hover:#3f3f5f;
  --text-primary:#e3e3e8;
  --text-body:#c4c4d0;
  --text-secondary:#a0a0b0;
  --text-muted:#8e8ea0;
  --text-dim:#6e6e80;
  --text-faint:#5a5a70;
  --text-ghost:#4a4a5a;
  --text-placeholder:#3a3a4a;
  --scrollbar:#333;
  --accent:#4285f4;
  --accent-hover:#5a9cf5;
  --accent-bg:#1a1a3a;
  --send-bg:#2a2a3a;
  --bubble-bg:#1e1e2e;
  --spinner-track:#2a2a3a;
  --spinner-color:#7c3aed;
  --lightbox-bg:rgba(0,0,0,0.92);
  --dropdown-shadow:rgba(0,0,0,0.6);
  --input-gradient:linear-gradient(transparent,#0d0d0d 30%);
  --del-hover-bg:#2a2a3a;
  --sg-overlay:rgba(0,0,0,0.85);
  --sg-card-bg:#18181b;
  --sg-border:#27272a;
  --sg-border-hover:#3f3f46;
  --sg-text:#a1a1aa;
  --sg-text-primary:#e4e4e7;
  --sg-dim:#52525b;
}
@media(prefers-color-scheme:light){
  :root{
    --bg-body:#f8f9fa;
    --bg-sidebar:#f0f0f0;
    --bg-topbar:#ffffff;
    --bg-surface:#e8eaed;
    --bg-surface-hover:#dfe1e5;
    --bg-input:#ffffff;
    --bg-card:#f1f3f4;
    --border:#e0e0e0;
    --border-mid:#dadce0;
    --border-hover:#bdc1c6;
    --text-primary:#1f1f1f;
    --text-body:#444746;
    --text-secondary:#5f6368;
    --text-muted:#80868b;
    --text-dim:#9aa0a6;
    --text-faint:#bdc1c6;
    --text-ghost:#9ca3af;
    --text-placeholder:#c4c7c5;
    --scrollbar:#c5c5c5;
    --accent:#1a73e8;
    --accent-hover:#1967d2;
    --accent-bg:#e8f0fe;
    --send-bg:#e8eaed;
    --bubble-bg:#e8eaed;
    --spinner-track:#dadce0;
    --spinner-color:#1a73e8;
    --lightbox-bg:rgba(0,0,0,0.7);
    --dropdown-shadow:rgba(0,0,0,0.15);
    --input-gradient:linear-gradient(transparent,#f8f9fa 30%);
    --del-hover-bg:#e8eaed;
    --sg-overlay:rgba(0,0,0,0.5);
    --sg-card-bg:#ffffff;
    --sg-border:#e0e0e0;
    --sg-border-hover:#bdc1c6;
    --sg-text:#5f6368;
    --sg-text-primary:#1f1f1f;
    --sg-dim:#9aa0a6;
  }
}

/* ── Reset & Base ── */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;margin:0;overflow:hidden;}
body{
  font-family:"Google Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg-body);color:var(--text-primary);font-size:14px;
}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px;}

/* ── Layout ── */
#app{display:flex;height:100vh;width:100%;}

/* ══════════════════════════════════════
   Sidebar (Gemini Style)
   ══════════════════════════════════════ */
.sidebar{
  width:260px;min-width:260px;
  background:var(--bg-sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:margin-left .25s ease, opacity .25s ease;
  z-index:50;flex-shrink:0;
}
.sidebar.collapsed{
  margin-left:-260px;opacity:0;pointer-events:none;
}

.sb-header{
  padding:12px 12px 8px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.sb-new-chat{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:24px;
  background:var(--bg-surface);border:1px solid var(--border-mid);
  color:var(--text-body);font-size:14px;font-weight:500;
  transition:all .15s;width:100%;
}
.sb-new-chat:hover{background:var(--bg-surface-hover);border-color:var(--border-hover);color:var(--text-primary);}
.sb-new-chat svg{width:18px;height:18px;flex-shrink:0;}

.sb-section-label{
  font-size:11px;color:var(--text-faint);font-weight:600;
  padding:16px 16px 6px;text-transform:uppercase;letter-spacing:0.5px;
}
.sb-list{flex:1;overflow-y:auto;padding:0 8px 12px;}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:12px;
  cursor:pointer;transition:background .12s;margin-bottom:2px;
  position:relative;
}
.sb-item:hover{background:var(--bg-surface);}
.sb-item.active{background:var(--bg-surface-hover);}
.sb-item-icon{
  width:20px;height:20px;flex-shrink:0;
  color:var(--text-dim);display:flex;align-items:center;justify-content:center;
}
.sb-item-icon svg{width:16px;height:16px;}
.sb-item-text{
  flex:1;min-width:0;font-size:13px;color:var(--text-secondary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;
}
.sb-item.active .sb-item-text{color:var(--text-primary);}
.sb-item-meta{font-size:10px;color:var(--text-ghost);white-space:nowrap;flex-shrink:0;}
.sb-item-del{
  width:24px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);opacity:0;transition:opacity .12s;flex-shrink:0;
}
.sb-item:hover .sb-item-del{opacity:1;}
.sb-item-del:hover{color:#ef4444;background:var(--del-hover-bg);}
.sb-item-del svg{width:14px;height:14px;}

.sb-empty{padding:24px 16px;text-align:center;font-size:13px;color:var(--text-placeholder);}

.sb-footer{padding:12px;border-top:1px solid var(--border);flex-shrink:0;}
.sb-footer-text{font-size:11px;color:var(--text-ghost);text-align:center;}

/* ══════════════════════════════════════
   Main Area
   ══════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;}

.top-bar{
  height:48px;min-height:48px;display:flex;align-items:center;
  padding:0 16px;border-bottom:1px solid var(--border);
  background:var(--bg-topbar);flex-shrink:0;gap:12px;
}
.hamburger{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:all .15s;flex-shrink:0;
}
.hamburger:hover{background:var(--bg-surface);color:var(--text-primary);}
.hamburger svg{width:20px;height:20px;}
.top-title{font-size:15px;font-weight:500;color:var(--text-primary);display:flex;align-items:center;gap:8px;}
.top-title .logo-icon{font-size:18px;}

/* ── Chat Area ── */
.chat-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:0 16px;}
.chat-inner{max-width:768px;width:100%;margin:0 auto;padding:24px 0 140px 0;flex:1;display:flex;flex-direction:column;}

/* ── Welcome Screen ── */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
.welcome-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#4285f4,#a855f7,#ec4899);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px;}
.welcome h2{font-size:28px;font-weight:400;color:#e3e3e8;margin-bottom:8px;background:linear-gradient(90deg,#4285f4,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.welcome-sub{font-size:15px;color:var(--text-muted);margin-bottom:32px;}
.suggestions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:600px;}
.suggestion{padding:10px 16px;border-radius:20px;background:var(--bg-card);border:1px solid var(--border-mid);color:var(--text-secondary);font-size:13px;transition:all .15s;text-align:left;max-width:280px;line-height:1.4;}
.suggestion:hover{background:var(--bg-surface-hover);color:var(--text-primary);border-color:var(--border-hover);}

/* ── Chat Messages ── */
#chatMessages{display:flex;flex-direction:column;gap:4px;}
.msg-user{display:flex;justify-content:flex-end;margin:8px 0;}
.msg-user .bubble{background:var(--bubble-bg);border-radius:20px 20px 4px 20px;padding:12px 18px;max-width:70%;font-size:15px;line-height:1.5;color:var(--text-primary);word-break:break-word;}
.edit-badge{display:inline-block;font-size:10px;font-weight:600;color:#a855f7;background:#a855f720;padding:2px 8px;border-radius:10px;margin-right:8px;vertical-align:middle;}

.msg-ai{margin:8px 0;}
.msg-ai .ai-icon{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#4285f4,#a855f7);display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:8px;flex-shrink:0;}

.image-grid{display:grid;gap:8px;border-radius:16px;overflow:hidden;}
.image-grid.g1{grid-template-columns:1fr;max-width:512px;}
.image-grid.g2{grid-template-columns:1fr 1fr;max-width:600px;}
.image-grid.g3{grid-template-columns:1fr 1fr;max-width:600px;}
.image-grid.g4{grid-template-columns:1fr 1fr;max-width:600px;}

.gallery-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.gallery-picker-overlay.open{opacity:1;}
.gallery-picker{background:#1a1a2e;border-radius:16px;width:92%;max-width:640px;max-height:75vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden;}
.gallery-picker-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 8px;}
.gallery-picker-title{font-size:16px;font-weight:700;color:#e4e4e7;}
.gallery-picker-close{font-size:22px;color:#71717a;cursor:pointer;padding:4px 8px;border-radius:6px;background:none;border:none;}
.gallery-picker-close:hover{color:var(--text-primary);}
.gallery-picker-tabs{display:flex;gap:8px;padding:8px 20px 12px;}
.gp-tab{padding:6px 14px;border-radius:20px;border:1px solid #3f3f46;background:none;color:#a1a1aa;font-size:13px;cursor:pointer;transition:all .15s;}
.gp-tab.active{background:#7c3aed;color:#fff;border-color:#7c3aed;}
.gallery-picker-scroll{flex:1;min-height:0;overflow-y:auto;padding:4px 20px 12px;}
.gallery-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.gp-item{cursor:pointer;border-radius:8px;overflow:hidden;position:relative;aspect-ratio:1;background:#111113;}
.gp-item img{width:100%;height:100%;object-fit:cover;transition:transform .15s;}
.gp-item:hover img{transform:scale(1.05);}
.gp-item-badge{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;}
.gp-item-prompt{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;font-size:10px;padding:12px 6px 4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.gallery-picker-empty{grid-column:1/-1;text-align:center;padding:40px 20px;color:#71717a;font-size:13px;}
.gallery-picker-footer{padding:12px 20px;border-top:1px solid #3f3f46;text-align:center;}
/* Gallery Lightbox */
.gp-lb-overlay{display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.92);flex-direction:column;align-items:center;justify-content:center;}
.gp-lb-overlay.active{display:flex;}
.gp-lb-topbar{position:absolute;top:16px;right:16px;display:flex;gap:8px;z-index:100000;}
.gp-lb-topbar a,.gp-lb-topbar button{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff;border:none;cursor:pointer;transition:background .15s;text-decoration:none;}
.gp-lb-topbar a:hover,.gp-lb-topbar button:hover{background:rgba(255,255,255,.2);}
.gp-lb-body{display:flex;gap:24px;padding:0 40px;max-width:1200px;width:100%;align-items:center;justify-content:center;}
.gp-lb-img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:8px;}
.gp-lb-side{min-width:240px;max-width:320px;display:flex;flex-direction:column;gap:12px;}
.gp-lb-meta{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:#999;}
.gp-lb-meta span{background:rgba(255,255,255,.08);border-radius:6px;padding:4px 10px;}
.gp-lb-prompt-label{font-size:11px;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.gp-lb-prompt{background:rgba(255,255,255,.08);border-radius:8px;padding:12px 16px;font-size:13px;color:#ccc;line-height:1.5;max-height:200px;overflow-y:auto;word-break:break-word;}
.gp-lb-select{margin-top:12px;padding:10px 20px;border-radius:8px;background:#7c3aed;color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:opacity .15s;}
.gp-lb-select:hover{filter:brightness(1.1);}
@media(max-width:768px){.gp-lb-body{flex-direction:column;padding:0 16px;}.gp-lb-side{max-width:100%;}}
.image-wrap{position:relative;overflow:hidden;border-radius:12px;background:var(--bg-card);min-height:120px;}
.image-wrap img{width:100%;display:block;border-radius:12px;transition:transform .2s;}
.image-wrap:hover img{transform:scale(1.02);}
.image-wrap .img-actions{position:absolute;bottom:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .2s;}
.image-wrap:hover .img-actions{opacity:1;}
.img-actions button{width:32px;height:32px;border-radius:8px;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);color:#fff;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.img-actions button:hover{background:rgba(0,0,0,0.9);}
.img-actions button svg{width:16px;height:16px;}

.msg-meta{font-size:12px;color:var(--text-dim);margin-top:8px;display:flex;align-items:center;gap:6px;}
.image-wrap img{cursor:pointer;}

/* ── Loading Spinner ── */
.nb-loading{display:flex;align-items:center;gap:12px;padding:20px 0;color:var(--text-muted);font-size:14px;}
.nb-spinner{width:24px;height:24px;border:3px solid var(--spinner-track);border-top-color:var(--spinner-color);border-radius:50%;animation:nb-spin 0.8s linear infinite;}
@keyframes nb-spin{to{transform:rotate(360deg);}}

/* ── Lightbox ── */
.lightbox{display:none;position:fixed;inset:0;z-index:9999;background:var(--lightbox-bg);align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.lb-toolbar{position:absolute;top:16px;right:16px;display:flex;gap:8px;}
.lb-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);color:#fff;display:flex;align-items:center;justify-content:center;transition:background .15s;border:none;cursor:pointer;}
.lb-btn:hover{background:rgba(255,255,255,0.25);}
.lb-btn svg{width:20px;height:20px;}

/* ── Bottom Input Area ── */
.input-area{position:absolute;bottom:0;left:0;right:0;padding:0 16px 16px;background:var(--input-gradient);pointer-events:none;}
.input-area > *{pointer-events:auto;}
.input-inner{max-width:768px;margin:0 auto;}

.settings-bar{display:none;flex-wrap:wrap;gap:8px;padding:8px 12px 10px;background:var(--bg-body);border-radius:16px 16px 0 0;}
.settings-bar.show{display:flex;}
.chip-group{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.chip-label{font-size:11px;color:var(--text-muted);margin-right:2px;white-space:nowrap;}
.chip{padding:5px 12px;border-radius:16px;border:1px solid var(--border-mid);background:var(--bg-card);color:var(--text-secondary);font-size:12px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.chip:hover{background:var(--bg-surface-hover);color:var(--text-primary);border-color:var(--border-hover);}
.chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.chip svg{width:12px;height:12px;}

.chip-select{position:relative;}
.chip-dropdown{display:none;position:absolute;bottom:calc(100% + 6px);left:0;background:var(--bg-input);border:1px solid var(--border-mid);border-radius:12px;min-width:160px;max-height:240px;overflow-y:auto;z-index:100;box-shadow:0 8px 24px var(--dropdown-shadow);}
.chip-dropdown.show{display:block;}
.chip-dropdown .dd-item{padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text-secondary);transition:background .1s;display:flex;align-items:center;justify-content:space-between;}
.chip-dropdown .dd-item:first-child{border-radius:12px 12px 0 0;}
.chip-dropdown .dd-item:last-child{border-radius:0 0 12px 12px;}
.chip-dropdown .dd-item:hover{background:var(--bg-surface);color:var(--text-primary);}
.chip-dropdown .dd-item.active{color:var(--accent);}
.dd-check{display:none;font-size:14px;}
.dd-item.active .dd-check{display:inline;}

.input-row{display:flex;align-items:flex-end;gap:8px;background:var(--bg-input);border:1px solid var(--border-mid);border-radius:28px;padding:6px 6px 6px 16px;transition:border-color .15s;}
.input-row:focus-within{border-color:var(--accent);}
.settings-toggle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:all .15s;flex-shrink:0;}
.settings-toggle:hover{color:var(--text-primary);background:var(--bg-surface);}
.settings-toggle.active{color:var(--accent);}
.settings-toggle svg{width:18px;height:18px;}
.prompt-wrap{flex:1;min-width:0;}
.prompt-wrap textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text-primary);font-size:15px;line-height:1.5;resize:none;max-height:120px;min-height:24px;font-family:inherit;overflow-y:auto;}
.prompt-wrap textarea::placeholder{color:var(--text-ghost);}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--send-bg);color:#555;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.send-btn.ready{background:var(--accent);color:#fff;}
.send-btn.ready:hover{background:var(--accent-hover);}
.send-btn svg{width:18px;height:18px;}

@media(max-width:1100px){
  .sidebar{width:220px;min-width:220px;}
  .sidebar.collapsed{margin-left:-220px;}
}
@media(max-width:900px){
  .sidebar{width:200px;min-width:200px;}
  .sidebar.collapsed{margin-left:-200px;}
  .chat-inner{padding:20px 0 140px 0;}
  .msg-user .bubble{max-width:80%;}
  .image-grid.g2,.image-grid.g3,.image-grid.g4{max-width:480px;}
}
@media(max-width:700px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;box-shadow:4px 0 24px rgba(0,0,0,0.5);width:260px;min-width:260px;}
  .sidebar.collapsed{margin-left:-260px;}
  .chat-inner{padding:16px 0 140px 0;}
  .suggestions{flex-direction:column;align-items:center;}
  .suggestion{max-width:100%;}
  .msg-user .bubble{max-width:85%;}
}

/* ── Card Action Buttons ── */
.card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.card-action-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:16px;
  background:var(--bg-card);border:1px solid var(--border-mid);
  color:var(--text-secondary);font-size:12px;transition:all .15s;white-space:nowrap;
}
.card-action-btn:hover{background:var(--bg-surface-hover);color:var(--text-primary);border-color:var(--border-hover);}
.card-action-btn svg{width:14px;height:14px;flex-shrink:0;}
.react-btns{display:flex;gap:4px;margin-left:auto;}
.react-btn{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-card);border:1px solid var(--border-mid);
  color:var(--text-dim);font-size:13px;transition:all .15s;
}
.react-btn:hover{background:var(--bg-surface-hover);color:var(--text-primary);border-color:var(--border-hover);}
.react-btn svg{width:14px;height:14px;}

/* ── 잠금(locked) 공통 ── */
[data-feature].locked{position:relative;opacity:.35;pointer-events:none;user-select:none;}
[data-feature].locked::after{
  content:'🔒';font-size:9px;position:absolute;top:2px;right:4px;
  pointer-events:none;line-height:1;
}

/* ── Sidebar Gallery Button ── */
.sb-gallery-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:12px;
  background:var(--bg-surface);border:1px solid var(--border-mid);
  color:var(--text-body);font-size:13px;font-weight:500;
  transition:all .15s;width:calc(100% - 16px);margin:8px 8px;
}
.sb-gallery-btn:hover{background:var(--bg-surface-hover);border-color:var(--border-hover);color:var(--text-primary);}
.sb-gallery-btn svg{flex-shrink:0;}

/* ── School Gallery Overlay ── */
.school-gallery-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:var(--sg-overlay);z-index:9999;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.school-gallery-overlay.open{opacity:1;pointer-events:auto;}
.sg-header{
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-bottom:1px solid var(--sg-border);flex-shrink:0;
  background:var(--sg-card-bg);
}
.sg-header h2{font-size:16px;font-weight:700;color:var(--sg-text-primary);}
.sg-close{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:var(--sg-text);transition:all .15s;font-size:18px;
}
.sg-close:hover{background:var(--bg-surface);color:var(--text-primary);}
.sg-body{flex:1;overflow-y:auto;padding:24px;}
.sg-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:16px;
}
.sg-card{
  background:var(--sg-card-bg);border:1px solid var(--sg-border);border-radius:12px;
  overflow:hidden;transition:border-color .15s;
}
.sg-card:hover{border-color:var(--sg-border-hover);}
.sg-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.sg-card-info{padding:10px 12px;}
.sg-card-prompt{
  font-size:12px;color:var(--sg-text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.4;
}
.sg-card-meta{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:6px;font-size:11px;color:var(--sg-dim);
}
.sg-empty{
  text-align:center;padding:60px 20px;color:var(--sg-dim);font-size:14px;
}
</style>
</head>

<script>
/* ══════════════════════════════════════
   Streamlit Component Protocol
   ══════════════════════════════════════ */
function sendMsg(type,data){window.parent.postMessage(Object.assign({isStreamlitMessage:true,type:type},data),"*");}
function init(){sendMsg("streamlit:componentReady",{apiVersion:1});}
function setFrameHeight(h){sendMsg("streamlit:setFrameHeight",{height:h});}
function setComponentValue(v){sendMsg("streamlit:setComponentValue",{value:v});}

/* ══════════════════════════════════════
   Data & Config
   ══════════════════════════════════════ */
var MODELS = [
  {id:"imagen-4.0-generate-001", label:"Imagen 4", desc:"Highest quality"},
  {id:"imagen-4.0-fast-generate-001", label:"Imagen 4 Fast", desc:"Faster generation"},
  {id:"imagen-4.0-ultra-generate-001", label:"Imagen 4 Ultra", desc:"Ultra high quality"}
];
var selectedModelIdx = 0;
var ASPECT_RATIOS = ["1:1","16:9","9:16","4:3","3:4"];
var selectedAR = "1:1";
var numImages = 1;
var STYLES = [
  {id:"auto", label:"Auto"},{id:"photorealistic", label:"Photo"},
  {id:"digital-art", label:"Digital Art"},{id:"anime", label:"Anime"},
  {id:"oil-painting", label:"Oil Painting"},{id:"watercolor", label:"Watercolor"},
  {id:"sketch", label:"Sketch"}
];
var selectedStyleIdx = 0;
var SUGGESTIONS = [
  "A serene Japanese garden with cherry blossoms and a koi pond at golden hour",
  "Futuristic cityscape with flying cars and neon lights in cyberpunk style",
  "A cozy coffee shop interior on a rainy day, warm lighting, watercolor style",
  "An astronaut riding a horse on the surface of Mars, photorealistic",
  "Underwater kingdom with bioluminescent coral and sea creatures",
  "A magical library with floating books and enchanted glowing staircases"
];

/* ══════════════════════════════════════
   Session State
   ══════════════════════════════════════ */
var state = { sessions: [], activeId: "", defaultModel: "" };
var _lastStateKey = "";

function findModelLabel(modelId){
  for(var i=0;i<MODELS.length;i++){
    if(MODELS[i].id===modelId) return MODELS[i].label;
  }
  return modelId || "Gemini Flash";
}

function getActiveSession(){
  for(var i = 0; i < state.sessions.length; i++){
    if(state.sessions[i].id === state.activeId) return state.sessions[i];
  }
  return null;
}

/* ══════════════════════════════════════
   Utility
   ══════════════════════════════════════ */
function escHtml(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}

/* ══════════════════════════════════════
   Build UI — Controls
   ══════════════════════════════════════ */

/* Sidebar Toggle */
document.getElementById("btnHamburger").addEventListener("click", function(){
  document.getElementById("sidebar").classList.toggle("collapsed");
});

/* New Session */
document.getElementById("btnNewChat").addEventListener("click", function(){
  setComponentValue({action:"new_session", ts:Date.now()});
});

/* Gallery Button */
var galleryBtn = document.getElementById('galleryBtn');
if (galleryBtn) {
  galleryBtn.addEventListener('click', function() {
    if (!this.classList.contains('locked')) {
      setComponentValue({action: 'open_gallery', ts: Date.now()});
    }
  });
}

/* Suggestions */
(function(){
  var wrap = document.getElementById("suggestions");
  SUGGESTIONS.forEach(function(s){
    var b = document.createElement("button");
    b.className = "suggestion";
    b.textContent = s;
    b.addEventListener("click", function(){
      document.getElementById("promptInput").value = s;
      autoResizeInput(); updateSendBtn();
      document.getElementById("promptInput").focus();
    });
    wrap.appendChild(b);
  });
})();

/* Model Tag (고정 — 모델은 서버에서 설정) */

/* Aspect Ratio Chips */
(function(){
  var grp = document.getElementById("arGroup");
  ASPECT_RATIOS.forEach(function(ar){
    var b = document.createElement("button");
    b.className = "chip" + (ar === selectedAR ? " active" : "");
    b.textContent = ar; b.dataset.ar = ar;
    b.addEventListener("click", function(){
      selectedAR = ar;
      grp.querySelectorAll(".chip").forEach(function(c){c.classList.remove("active");});
      b.classList.add("active");
    });
    grp.appendChild(b);
  });
})();

/* Num Images Dropdown */
function buildNumDropdown(){
  var dd = document.getElementById("numDropdown"); dd.innerHTML = "";
  [1,2,3,4].forEach(function(n){
    var d = document.createElement("div");
    d.className = "dd-item" + (n === numImages ? " active" : "");
    d.innerHTML = '<span>'+n+(n===1?' image':' images')+'</span><span class="dd-check">\u2713</span>';
    d.addEventListener("click", function(e){ e.stopPropagation(); numImages = n;
      document.getElementById("numLabel").textContent = n+(n===1?' image':' images');
      dd.classList.remove("show"); buildNumDropdown();
    });
    dd.appendChild(d);
  });
}
buildNumDropdown();
document.getElementById("numChip").addEventListener("click", function(e){
  e.stopPropagation(); closeAllDropdowns();
  document.getElementById("numDropdown").classList.toggle("show");
});

/* Style Dropdown */
function buildStyleDropdown(){
  var dd = document.getElementById("styleDropdown"); dd.innerHTML = "";
  STYLES.forEach(function(s,i){
    var d = document.createElement("div");
    d.className = "dd-item" + (i === selectedStyleIdx ? " active" : "");
    d.innerHTML = '<span>'+s.label+'</span><span class="dd-check">\u2713</span>';
    d.addEventListener("click", function(e){ e.stopPropagation(); selectedStyleIdx = i;
      document.getElementById("styleLabel").textContent = s.label;
      dd.classList.remove("show"); buildStyleDropdown();
    });
    dd.appendChild(d);
  });
}
buildStyleDropdown();
document.getElementById("styleChip").addEventListener("click", function(e){
  e.stopPropagation(); closeAllDropdowns();
  document.getElementById("styleDropdown").classList.toggle("show");
});

function closeAllDropdowns(){document.querySelectorAll(".chip-dropdown").forEach(function(d){d.classList.remove("show");});}
document.addEventListener("click", function(e){if(!e.target.closest(".chip-select")) closeAllDropdowns();});

/* Settings Toggle */
document.getElementById("settingsToggle").addEventListener("click", function(){
  var bar = document.getElementById("settingsBar");
  var open = bar.classList.toggle("show");
  this.classList.toggle("active", open);
});

/* Input Auto-resize */
function autoResizeInput(){
  var ta = document.getElementById("promptInput");
  ta.style.height = "auto"; ta.style.height = Math.min(ta.scrollHeight, 120)+"px";
}
document.getElementById("promptInput").addEventListener("input", function(){ autoResizeInput(); updateSendBtn(); });
document.getElementById("promptInput").addEventListener("keydown", function(e){
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); handleGenerate(); }
});
function updateSendBtn(){
  var btn = document.getElementById("sendBtn");
  btn.classList.toggle("ready", document.getElementById("promptInput").value.trim().length > 0);
}

/* ══════════════════════════════════════
   Sidebar Rendering
   ══════════════════════════════════════ */
var TRASH_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>';
var IMG_ICON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';

function renderSidebar(){
  var list = document.getElementById("sbList");
  list.innerHTML = "";

  if(state.sessions.length === 0){
    var empty = document.createElement("div");
    empty.className = "sb-empty";
    empty.textContent = "No sessions yet";
    list.appendChild(empty);
    return;
  }

  state.sessions.forEach(function(session){
    var el = document.createElement("div");
    el.className = "sb-item" + (session.id === state.activeId ? " active" : "");

    el.innerHTML =
      '<div class="sb-item-icon">' + IMG_ICON_SVG + '</div>' +
      '<div class="sb-item-text">' + escHtml(session.title || "New Image") + '</div>' +
      '<div class="sb-item-meta">' + (session.turns.length || "") + '</div>';

    /* Delete button */
    var delBtn = document.createElement("button");
    delBtn.className = "sb-item-del"; delBtn.title = "Delete";
    delBtn.innerHTML = TRASH_SVG;
    (function(id){
      delBtn.addEventListener("click", function(e){
        e.stopPropagation();
        setComponentValue({action:"delete_session", session_id:id, ts:Date.now()});
      });
    })(session.id);
    el.appendChild(delBtn);

    /* Click to switch */
    (function(id){
      el.addEventListener("click", function(){
        if(id !== state.activeId){
          setComponentValue({action:"switch_session", session_id:id, ts:Date.now()});
        }
      });
    })(session.id);

    list.appendChild(el);
  });
}

/* ══════════════════════════════════════
   Chat Rendering
   ══════════════════════════════════════ */
function renderChat(){
  var container = document.getElementById("chatMessages");
  var welcome = document.getElementById("welcome");
  var session = getActiveSession();

  if(!session || session.turns.length === 0){
    welcome.style.display = "";
    container.innerHTML = "";
    setFrameHeight(document.body.scrollHeight);
    renderSidebar();
    return;
  }
  welcome.style.display = "none";
  container.innerHTML = "";

  /* Turns are in chronological order */
  session.turns.forEach(function(turn){
    /* User prompt bubble */
    var userDiv = document.createElement("div");
    userDiv.className = "msg-user";
    var userBubble = document.createElement("div");
    userBubble.className = "bubble";
    if(turn.is_edit){
      userBubble.innerHTML = '<span class="edit-badge">EDIT</span>' + escHtml(turn.prompt);
    } else {
      userBubble.textContent = turn.prompt;
    }
    userDiv.appendChild(userBubble);
    container.appendChild(userDiv);

    /* AI response */
    var aiDiv = document.createElement("div");
    aiDiv.className = "msg-ai";
    var icon = document.createElement("div");
    icon.className = "ai-icon"; icon.textContent = "\u2728";
    aiDiv.appendChild(icon);

    if(turn.loading){
      /* ── 로딩 스피너 ── */
      var loadWrap = document.createElement("div");
      loadWrap.className = "nb-loading";
      loadWrap.innerHTML = '<div class="nb-spinner"></div><span>Generating image...</span>';
      aiDiv.appendChild(loadWrap);

      var meta = document.createElement("div");
      meta.className = "msg-meta";
      meta.innerHTML = escHtml(turn.model_label || "") + ' &middot; ' + (turn.aspect_ratio || "1:1");
      aiDiv.appendChild(meta);
    } else if(turn.image_urls && turn.image_urls.length > 0){
      var gridClass = "image-grid";
      var cnt = turn.image_urls.length;
      if(cnt === 1) gridClass += " g1";
      else if(cnt === 2) gridClass += " g2";
      else if(cnt === 3) gridClass += " g3";
      else gridClass += " g4";

      var grid = document.createElement("div");
      grid.className = gridClass;

      turn.image_urls.forEach(function(url){
        var wrap = document.createElement("div");
        wrap.className = "image-wrap";
        var img = document.createElement("img");
        img.src = url; img.loading = "lazy"; img.alt = "Generated image";
        img.onerror = function(){ this.style.display="none"; };

      if(cnt > 1) metaHtml += ' &middot; ' + cnt + ' images';
      meta.innerHTML = metaHtml;

          'Omni에서 창작 시작</button>' +
        '<button class="card-action-btn" data-feature="nanobanana.lipsync">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>' +
          '립싱크</button>' +
        '<button class="card-action-btn" data-feature="nanobanana.frame_extract">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>' +
          '프레임 추출</button>' +
        '<button class="card-action-btn" data-feature="nanobanana.share">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>' +
          '공유</button>' +

          '즐겨찾기</button>' +
        '<span class="react-btns">' +
          '<button class="react-btn" data-feature="nanobanana.like" title="Like">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>' +
          '</button>' +

    } else {
      var emptyDiv = document.createElement("div");
      emptyDiv.className = "msg-meta";

  });

  var chatArea = document.getElementById("chatArea");
  setTimeout(function(){ chatArea.scrollTop = chatArea.scrollHeight; }, 50);
  setFrameHeight(document.body.scrollHeight);
  renderSidebar();
}

/* ══════════════════════════════════════
   Generate
   ══════════════════════════════════════ */
var _generateLock = false;
function handleGenerate(){
  if(_generateLock) return;
  var ta = document.getElementById("promptInput");
  var prompt = ta.value.trim();
  if(!prompt) return;

  _generateLock = true;

  var s = STYLES[selectedStyleIdx];

  var _ts = Date.now();
  var payload = {
    action: "generate",
    item_id: "nb_" + _ts,
    prompt: prompt,
    model_id: state.defaultModel || MODELS[0].id,
    model_label: findModelLabel(state.defaultModel || MODELS[0].id),
    aspect_ratio: selectedAR,
    num_images: numImages,
    style_preset: s.id === "auto" ? null : s.id,
    negative_prompt: "",
    settings: {},
    ts: _ts
  };
  if(_refDataUrl) { payload.reference_image = _refDataUrl; }
  setComponentValue(payload);

  ta.value = "";
  _refDataUrl = null;
  document.getElementById("refPreview").style.display = "none";
  autoResizeInput(); updateSendBtn();
}
document.getElementById("sendBtn").addEventListener("click", handleGenerate);

/* ── 참고 이미지 업로드 + 갤러리 피커 ── */
var _refDataUrl = null;
var _nbSourceGallery = [];

function _resolveToDataUrl(url, cb) {
  if (!url || url.startsWith("data:")) { cb(url); return; }
  fetch(url).then(function(r){return r.blob();}).then(function(blob){
    var reader = new FileReader();
    reader.onload = function(){ cb(reader.result); };
    reader.readAsDataURL(blob);
  }).catch(function(){ cb(url); });
}

function _showNbGalleryPicker() {
  var overlay = document.getElementById("galleryPickerOverlay");
  overlay.style.display = "flex";
  requestAnimationFrame(function(){ overlay.classList.add("open"); });
  _renderNbPickerGrid("all");
  overlay.querySelectorAll(".gp-tab").forEach(function(btn){ btn.classList.toggle("active", btn.getAttribute("data-filter")==="all"); });
}
function _hideNbGalleryPicker() {
  var overlay = document.getElementById("galleryPickerOverlay");
  overlay.classList.remove("open");
  setTimeout(function(){ overlay.style.display = "none"; }, 200);
}
function _renderNbPickerGrid(filter) {
  var grid = document.getElementById("galleryPickerGrid");
  var items = _nbSourceGallery || [];
  var filtered = filter === "all" ? items : items.filter(function(it){ return it.source === filter; });
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="gallery-picker-empty">선택 가능한 이미지가 없습니다</div>';
    return;
  }
  grid.innerHTML = filtered.map(function(it){
    var badge = it.source === "mj" ? "MJ" : "NB";
    return '<div class="gp-item"><img src="'+it.url+'" loading="lazy"><div class="gp-item-badge">'+badge+'</div>'+(it.prompt?'<div class="gp-item-prompt">'+it.prompt+'</div>':'')+'</div>';
  }).join("");
  grid.querySelectorAll(".gp-item").forEach(function(el, i){
    el.addEventListener("click", function(){
      _openGpLb(filtered[i]);
    });
  });
}

/* Gallery Picker Lightbox */
var _gpLbCurrent = null;
function _openGpLb(item) {
  _gpLbCurrent = item;
  var o = document.getElementById("gpLbOverlay");
  document.getElementById("gpLbImg").src = item.url;
  document.getElementById("gpLbDl").onclick = function(e){
    e.preventDefault();
    fetch(item.url).then(function(r){return r.blob();}).then(function(blob){
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = item.url.split("/").pop() || "download";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }).catch(function(){ window.open(item.url,"_blank"); });
  };
  var meta = [];
  if(item.source) meta.push('<span>'+(item.source==="mj"?"MJ":"NB")+'</span>');
  if(item.prompt) meta.push('<span>'+item.prompt.slice(0,60)+'</span>');
  document.getElementById("gpLbMeta").innerHTML = meta.join("");
  var pr = document.getElementById("gpLbPrompt");
  pr.textContent = item.prompt || "";
  pr.style.display = item.prompt ? "block" : "none";
  o.classList.add("active");
}
function _closeGpLb() { document.getElementById("gpLbOverlay").classList.remove("active"); }
document.getElementById("gpLbSelect").addEventListener("click", function(){
  if(!_gpLbCurrent) return;
  _resolveToDataUrl(_gpLbCurrent.url, function(dataUrl){
    _refDataUrl = dataUrl;
    document.getElementById("refThumb").src = dataUrl;
    document.getElementById("refPreview").style.display = "block";
    _closeGpLb();
    _hideNbGalleryPicker();
  });
});
document.addEventListener("keydown", function(e){ if(e.key==="Escape" && document.getElementById("gpLbOverlay").classList.contains("active")) _closeGpLb(); });

// 갤러리 피커 이벤트
(function(){
  var overlay = document.getElementById("galleryPickerOverlay");
  if(!overlay) return;
  overlay.addEventListener("click", function(e){ if(e.target===overlay) _hideNbGalleryPicker(); });
  overlay.querySelector(".gallery-picker-close").addEventListener("click", _hideNbGalleryPicker);
  overlay.querySelectorAll(".gp-tab").forEach(function(btn){
    btn.addEventListener("click", function(){
      overlay.querySelectorAll(".gp-tab").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      _renderNbPickerGrid(btn.getAttribute("data-filter"));
    });
  });
  document.getElementById("gpUploadBtn").addEventListener("click", function(){
    _hideNbGalleryPicker();
    document.getElementById("refFileInput").click();
  });
})();

document.getElementById("refBtn").addEventListener("click", function(){
  _showNbGalleryPicker();
});
document.getElementById("refFileInput").addEventListener("change", function(e){
  var file = e.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    _refDataUrl = ev.target.result;
    document.getElementById("refThumb").src = _refDataUrl;
    document.getElementById("refPreview").style.display = "block";
  };
  reader.readAsDataURL(file);
  e.target.value = "";
});
document.getElementById("refRemove").addEventListener("click", function(){
  _refDataUrl = null;
  document.getElementById("refPreview").style.display = "none";
});

/* ── 잠금 판정 ── */
function applyFeatureLocks(enabledFeatures) {
  var featureSet = {};
  (enabledFeatures || []).forEach(function(f){ featureSet[f] = true; });
  document.querySelectorAll('[data-feature]').forEach(function(el){
    if (featureSet[el.getAttribute('data-feature')]) {
      el.classList.remove('locked');
    } else {
      el.classList.add('locked');
    }
  });
}

/* ══════════════════════════════════════
   Streamlit Render (Receive Sessions)
   ══════════════════════════════════════ */
window.addEventListener("message", function(event){
  if(event.data.type !== "streamlit:render") return;
  var args = event.data.args || {};
  setFrameHeight(document.body.scrollHeight);

  _nbSourceGallery = args.source_gallery || [];

  var schoolGallery = args.school_gallery;
  if (schoolGallery && Array.isArray(schoolGallery)) {
    renderSchoolGallery(schoolGallery);
    document.getElementById('schoolGallery').classList.add('open');
  }

  /* Update model from backend */
  if(args.default_model){
    state.defaultModel = args.default_model;
    document.getElementById("modelLabel").textContent = findModelLabel(args.default_model);
  }

  var sessions = args.sessions || [];
  var activeId = args.active_id || "";

  /* Change detection key (includes loading state + image count) */
  var key = activeId + "||" + sessions.map(function(s){
    return s.id + "|" + (s.turns || []).length + "|" + (s.turns || []).map(function(t){
      return (t.turn_id || "") + (t.loading ? "L" : "") + ((t.image_urls || []).length);
    }).join(",");
  }).join(";;");

  if(key === _lastStateKey) {
    // 잠금 판정 (even if chat unchanged, lock state may differ)
    applyFeatureLocks(args.enabled_features || []);
    return;
  }
  _lastStateKey = key;
  _generateLock = false;

  state.sessions = sessions;
  state.activeId = activeId;

  renderChat();
  // 잠금 판정 (after render so dynamically created data-feature elements exist)
  applyFeatureLocks(args.enabled_features || []);
});

/* ══════════════════════════════════════
   Lightbox
   ══════════════════════════════════════ */
var _lbCurrentUrl = "";
var lbEl = document.getElementById("lightbox");
var lbImg = document.getElementById("lbImage");

function openLightbox(url){
  _lbCurrentUrl = url;
  lbImg.src = url;
  lbEl.classList.add("open");
}
function closeLightbox(){
  lbEl.classList.remove("open");
  lbImg.src = "";
  _lbCurrentUrl = "";
}
document.getElementById("lbClose").addEventListener("click", closeLightbox);
lbEl.addEventListener("click", function(e){
  if(e.target === lbEl) closeLightbox();
});
document.addEventListener("keydown", function(e){
  if(e.key === "Escape" && lbEl.classList.contains("open")) closeLightbox();
});
document.getElementById("lbDownload").addEventListener("click", function(){
  if(!_lbCurrentUrl) return;
  fetch(_lbCurrentUrl).then(function(r){return r.blob();}).then(function(blob){
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "nanobanana_" + Date.now() + ".png";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }).catch(function(){ window.open(_lbCurrentUrl,"_blank"); });
});

/* ══════════════════════════════════════
   School Gallery
   ══════════════════════════════════════ */
function renderSchoolGallery(items) {
  var grid = document.getElementById('sgGrid');
  var empty = document.getElementById('sgEmpty');
  grid.innerHTML = '';
  if (!items || items.length === 0) {
    empty.style.display = 'block';
    grid.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  grid.style.display = '';
  items.forEach(function(item) {
    var urls = item.image_urls || [];
    urls.forEach(function(imgUrl) {
      var card = document.createElement('div');
      card.className = 'sg-card';
      card.innerHTML =
        '<img src="' + escHtml(imgUrl) + '" loading="lazy" onerror="this.style.display=\'none\'">' +
        '<div class="sg-card-info">' +
          '<div class="sg-card-prompt">' + escHtml(item.prompt || '') + '</div>' +
          '<div class="sg-card-meta"><span>' + escHtml(item.nickname || item.user_id || '') + '</span><span>' + escHtml(item.model_label || '') + '</span></div>' +
        '</div>';
      grid.appendChild(card);
    });
  });
}

document.getElementById('sgClose').addEventListener('click', function() {
  document.getElementById('schoolGallery').classList.remove('open');
  setComponentValue({action: 'close_gallery', ts: Date.now()});
});

init();
</script>
