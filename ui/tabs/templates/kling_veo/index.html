<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg-main:#0e0e10;
  --bg-sidebar:#111113;
  --bg-card:#18181b;
  --bg-input:#111113;
  --bg-hover:#1e1e22;
  --bg-active:#1a1a2e;
  --bg-dropdown:#1a1a1e;
  --bg-opt:#111113;
  --bg-opt-active:#27272a;
  --bg-video:#111;
  --bg-video-full:#000;
  --border-light:#1e1e22;
  --border-mid:#222;
  --border-main:#27272a;
  --border-heavy:#333;
  --border-hover:#3f3f46;
  --border-focus:#444;
  --border-dim:#555;
  --text-primary:#fff;
  --text-body:#d0d0d0;
  --text-heading:#e4e4e7;
  --text-secondary:#a1a1aa;
  --text-muted:#71717a;
  --text-dim:#888;
  --text-chip:#aaa;
  --text-bright:#bbb;
  --text-placeholder:#555;
  --text-subtle:#52525b;
  --text-ccc:#ccc;
  --accent-purple:#a78bfa;
  --accent-purple-mid:#8b5cf6;
  --accent-purple-dark:#6366f1;
  --accent-green:#22c55e;
  --accent-green-light:#4ade80;
  --accent-green-badge:#6ee7b7;
  --accent-amber:#f59e0b;
  --accent-error:#f87171;
  --shadow-dropdown:rgba(0,0,0,.5);
  --overlay-dark:rgba(0,0,0,0.85);
  --overlay-mid:rgba(0,0,0,.55);
  --scrollbar-thumb:#333;
  --frame-remove-bg:rgba(0,0,0,.7);
  --play-btn-bg:rgba(255,255,255,.2);
  --play-btn-hover:rgba(255,255,255,.35);
  --picker-close-hover:rgba(255,255,255,.08);
  --picker-footer-border:rgba(255,255,255,.08);
  --picker-upload-hover:rgba(255,255,255,.05);
  --badge-bg:rgba(0,0,0,.65);
  --video-gradient:rgba(0,0,0,.6);
  --video-gradient-bottom:rgba(0,0,0,.7);
}
@media(prefers-color-scheme:light){
  :root{
    --bg-main:#f5f6f8;
    --bg-sidebar:#ffffff;
    --bg-card:#ffffff;
    --bg-input:#f3f4f6;
    --bg-hover:#e5e7eb;
    --bg-active:#ede9fe;
    --bg-dropdown:#ffffff;
    --bg-opt:#f3f4f6;
    --bg-opt-active:#e5e7eb;
    --bg-video:#f0f0f0;
    --bg-video-full:#e5e5e5;
    --border-light:#e5e7eb;
    --border-mid:#d1d5db;
    --border-main:#d1d5db;
    --border-heavy:#c0c4cc;
    --border-hover:#9ca3af;
    --border-focus:#9ca3af;
    --border-dim:#9ca3af;
    --text-primary:#1a1a1a;
    --text-body:#1f2937;
    --text-heading:#111827;
    --text-secondary:#4b5563;
    --text-muted:#6b7280;
    --text-dim:#6b7280;
    --text-chip:#4b5563;
    --text-bright:#374151;
    --text-placeholder:#9ca3af;
    --text-subtle:#6b7280;
    --text-ccc:#374151;
    --accent-purple:#7c3aed;
    --accent-purple-mid:#7c3aed;
    --accent-purple-dark:#4f46e5;
    --accent-green:#16a34a;
    --accent-green-light:#22c55e;
    --accent-green-badge:#059669;
    --accent-amber:#d97706;
    --accent-error:#dc2626;
    --shadow-dropdown:rgba(0,0,0,.15);
    --overlay-dark:rgba(0,0,0,0.4);
    --overlay-mid:rgba(0,0,0,.25);
    --scrollbar-thumb:#c0c4cc;
    --frame-remove-bg:rgba(0,0,0,.5);
    --play-btn-bg:rgba(0,0,0,.3);
    --play-btn-hover:rgba(0,0,0,.45);
    --picker-close-hover:rgba(0,0,0,.08);
    --picker-footer-border:rgba(0,0,0,.08);
    --picker-upload-hover:rgba(0,0,0,.05);
    --badge-bg:rgba(0,0,0,.55);
    --video-gradient:rgba(0,0,0,.5);
    --video-gradient-bottom:rgba(0,0,0,.6);
  }
}
html,body{height:100%;margin:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg-main);color:var(--text-body);
}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;}
input[type="file"]{display:none;}

/* ── 전체 레이아웃 ── */
#app-root{display:flex;height:100%;width:100%;overflow:hidden;}

/* ── 좌측 사이드바 ── */
.sidebar{
  width:72px;min-width:72px;background:var(--bg-sidebar);
  border-right:1px solid var(--border-light);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0 12px;gap:2px;
  overflow-y:auto;overflow-x:hidden;
}
.sb-logo{
  display:flex;align-items:center;justify-content:center;
  width:56px;height:44px;margin-bottom:8px;
  font-size:16px;font-weight:800;color:var(--text-primary);
  letter-spacing:-0.5px;
}
.sb-logo svg{width:28px;height:28px;}
.sb-divider{width:40px;height:1px;background:var(--border-main);margin:4px 0 6px;}
.sb-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:56px;height:52px;border-radius:10px;
  font-size:9px;color:var(--text-muted);gap:3px;
  transition:background .15s,color .15s;flex-shrink:0;
}
.sb-item:hover{background:var(--bg-hover);color:var(--text-secondary);}
.sb-item.active{background:var(--bg-active);color:var(--accent-purple);}
.sb-item svg{width:20px;height:20px;flex-shrink:0;}
.sb-spacer{flex:1;min-height:12px;}
.sb-credits{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:56px;height:52px;border-radius:10px;
  font-size:9px;color:var(--text-muted);gap:2px;flex-shrink:0;
}
.sb-credits .num{font-size:11px;font-weight:700;color:var(--accent-purple);}

/* ── 메인 콘텐츠 ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* 탑 네비 */
.top-nav{
  height:44px;display:flex;align-items:center;gap:0;
  border-bottom:1px solid var(--border-mid);padding:0 20px;flex-shrink:0;
}
.nav-tab{
  padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-muted);
  border-bottom:2px solid transparent;transition:color .15s,border-color .15s;
}
.nav-tab:hover{color:var(--text-ccc);}
.nav-tab.active{color:var(--text-primary);border-bottom-color:var(--text-primary);}

/* 본문 래퍼 */
.body-wrap{flex:1;display:flex;overflow:hidden;}

/* ── 좌측 패널 (입력) ── */
.left-panel{
  width:440px;min-width:360px;max-width:500px;
  border-right:1px solid var(--border-mid);
  display:flex;flex-direction:column;overflow-y:auto;
  padding:20px;gap:16px;
}

/* 모델 선택 */
.model-selector{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;background:var(--bg-card);border-radius:12px;
  cursor:pointer;position:relative;transition:background .15s;
}
.model-selector:hover{background:var(--bg-hover);}
.model-icon{
  width:36px;height:36px;border-radius:8px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;color:var(--text-primary);flex-shrink:0;
}
.model-info{flex:1;}
.model-name{font-size:13px;font-weight:600;color:var(--text-heading);}
.model-desc{font-size:11px;color:var(--text-muted);margin-top:2px;}
.model-arrow{transition:transform .2s;color:var(--text-muted);flex-shrink:0;}
.model-arrow.open{transform:rotate(180deg);}

/* 모델 드롭다운 */
.model-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--bg-dropdown);border:1px solid var(--border-main);border-radius:12px;
  box-shadow:0 8px 24px var(--shadow-dropdown);
  z-index:100;max-height:360px;overflow-y:auto;
  display:none;padding:6px;
}
.model-dropdown.show{display:block;}
.model-option{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;
  cursor:pointer;transition:background .12s;
}
.model-option:hover{background:var(--bg-opt-active);}
.model-option.selected{background:var(--bg-active);}
.model-option .mo-icon{
  width:32px;height:32px;border-radius:6px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:var(--text-primary);flex-shrink:0;
}
.model-option .mo-info{flex:1;}
.model-option .mo-name{font-size:12px;font-weight:600;color:var(--text-heading);}
.model-option .mo-desc{font-size:10px;color:var(--text-muted);margin-top:1px;}
.model-option .mo-check{
  width:18px;height:18px;border-radius:50%;
  border:2px solid var(--border-hover);display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.model-option.selected .mo-check{border-color:var(--accent-purple-mid);background:var(--accent-purple-mid);}
.model-option.selected .mo-check::after{
  content:"";display:block;width:6px;height:6px;border-radius:50%;background:#fff;
}

/* ── 프레임 업로드 ── */
.frame-section{display:flex;flex-direction:column;gap:10px;}
.frame-section-label{font-size:12px;color:var(--text-muted);font-weight:500;}
.frame-row{display:flex;gap:10px;}
.frame-upload{
  flex:1;border:1px dashed var(--border-heavy);border-radius:12px;
  padding:24px 16px;text-align:center;
  background:var(--bg-input);cursor:pointer;
  transition:border-color .15s,background .15s;
  position:relative;overflow:hidden;
}
.frame-upload:hover{border-color:var(--border-dim);background:var(--bg-card);}
.frame-upload.drag-over{border-color:var(--accent-purple-mid);background:var(--bg-active);}
.frame-upload.has-image{padding:0;border-style:solid;border-color:var(--border-main);}
.frame-upload .upload-icon{margin-bottom:6px;}
.frame-upload .upload-icon svg{width:28px;height:28px;color:var(--text-placeholder);}
.frame-upload .label{font-size:12px;color:var(--text-dim);}
.frame-upload .sub-label{font-size:10px;color:var(--text-subtle);margin-top:4px;}
/* 프리뷰 */
.frame-preview{
  width:100%;height:100%;min-height:120px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.frame-preview img{
  max-width:100%;max-height:160px;object-fit:contain;border-radius:8px;
}
.frame-remove{
  position:absolute;top:6px;right:6px;
  width:24px;height:24px;border-radius:50%;
  background:var(--frame-remove-bg);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;z-index:2;
  opacity:0;transition:opacity .15s;
}
.frame-upload:hover .frame-remove{opacity:1;}

/* ── 사운드 효과 섹션 ── */
.sound-section{
  display:flex;flex-direction:column;gap:10px;
}
.sound-header{
  display:flex;align-items:center;justify-content:space-between;
}
.sound-title{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--text-heading);
}
.sound-title svg{width:16px;height:16px;color:var(--text-secondary);}
.sound-badge{
  padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;
  background:var(--bg-opt-active);color:var(--accent-green-badge);
}
.toggle-switch{
  position:relative;width:44px;height:24px;
  background:var(--bg-opt-active);border-radius:12px;cursor:pointer;
  transition:background .2s;flex-shrink:0;
}
.toggle-switch.on{background:var(--accent-green);}
.toggle-switch .knob{
  position:absolute;top:2px;left:2px;
  width:20px;height:20px;border-radius:50%;
  background:#fff;transition:left .2s;
}
.toggle-switch.on .knob{left:22px;}
.sound-desc{
  padding:12px 14px;background:var(--bg-input);border:1px solid var(--border-mid);border-radius:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.sound-desc-text{font-size:12px;color:var(--text-muted);flex:1;}
.sound-adv{
  font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:4px;
  cursor:pointer;white-space:nowrap;
}
.sound-adv svg{width:14px;height:14px;}

/* ── 프롬프트 ── */
.prompt-area{flex:1;display:flex;flex-direction:column;gap:8px;}
.prompt-area textarea{
  flex:1;min-height:100px;resize:none;
  background:var(--bg-input);border:1px solid var(--border-mid);border-radius:10px;
  padding:12px 14px;font-size:13px;color:var(--text-body);
  font-family:inherit;line-height:1.5;
}
.prompt-area textarea::placeholder{color:var(--text-placeholder);}
.prompt-area textarea:focus{outline:none;border-color:var(--border-focus);}

.prompt-toolbar{display:flex;align-items:center;gap:8px;}
.prompt-tool{
  display:flex;align-items:center;gap:4px;
  padding:5px 10px;border-radius:6px;
  font-size:11px;color:var(--text-dim);background:var(--bg-card);
}
.prompt-tool:hover{background:var(--border-mid);color:var(--text-bright);}

/* ── 하단 설정바 ── */
.bottom-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-top:1px solid var(--border-mid);
  flex-shrink:0;position:relative;
}
.settings-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.setting-chip{
  padding:5px 12px;border-radius:8px;font-size:12px;
  background:var(--bg-card);color:var(--text-chip);border:1px solid var(--border-main);
  display:flex;align-items:center;gap:4px;
}
.setting-chip svg{width:14px;height:14px;}
.setting-chip .chip-arrow{
  transition:transform .2s;display:inline-flex;
}
.setting-chip .chip-arrow.open{transform:rotate(180deg);}

/* 설정 팝업 */
.settings-popup{
  position:absolute;bottom:calc(100% + 8px);left:20px;
  width:340px;
  background:var(--bg-card);border:1px solid var(--border-main);border-radius:14px;
  box-shadow:0 -8px 32px var(--shadow-dropdown);
  padding:20px;z-index:200;
  display:none;
}
.settings-popup.show{display:block;}
.sp-group{margin-bottom:16px;}
.sp-group:last-child{margin-bottom:0;}
.sp-label{font-size:12px;color:var(--text-muted);margin-bottom:8px;font-weight:500;}
.sp-options{
  display:flex;gap:0;border:1px solid var(--border-main);border-radius:10px;overflow:hidden;
}
.sp-opt{
  flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:500;
  color:var(--text-muted);background:var(--bg-opt);cursor:pointer;
  transition:background .12s,color .12s;
  position:relative;border-right:1px solid var(--border-main);
}
.sp-opt:last-child{border-right:none;}
.sp-opt.active{background:var(--bg-opt-active);color:var(--text-primary);}
.sp-opt:hover:not(.active){background:var(--bg-dropdown);}
.sp-opt .vip{
  position:absolute;top:-1px;right:4px;
  font-size:8px;font-weight:700;color:var(--accent-amber);
  background:var(--bg-opt-active);padding:1px 4px;border-radius:3px;
}

/* 생성 버튼 (Kling 스타일 초록) */
.btn-generate{
  padding:10px 28px;border-radius:10px;font-size:14px;font-weight:600;
  background:linear-gradient(135deg,var(--accent-green),var(--accent-green-light));
  color:#fff;transition:opacity .15s;flex-shrink:0;
  display:flex;align-items:center;gap:6px;
}
.btn-generate:hover{opacity:.85;}
.btn-generate .credit-icon{font-size:16px;}

/* ── 우측 패널 (결과) ── */
.right-panel{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:16px;
}
.result-header{display:flex;align-items:center;gap:12px;}
.filter-tabs{display:flex;gap:0;border:1px solid var(--border-heavy);border-radius:8px;overflow:hidden;}
.filter-tab{
  padding:6px 14px;font-size:12px;color:var(--text-dim);background:var(--bg-card);
  border-right:1px solid var(--border-heavy);
}
.filter-tab:last-child{border-right:none;}
.filter-tab.active{background:var(--bg-opt-active);color:var(--text-primary);}

.result-grid{display:flex;flex-direction:column;gap:16px;}

.result-card{
  background:var(--bg-card);border-radius:12px;overflow:hidden;border:1px solid var(--border-main);
}
.card-header{
  padding:12px 16px;display:flex;align-items:center;gap:8px;
}
.card-header-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.card-header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.card-header-right button{
  width:28px;height:28px;border-radius:6px;background:var(--bg-opt-active);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);
}
.card-header-right button:hover{background:var(--border-heavy);color:var(--text-ccc);}
.card-icon{
  width:24px;height:24px;border-radius:6px;
  background:var(--bg-opt-active);display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--text-dim);flex-shrink:0;
}
.card-title{font-size:13px;font-weight:600;color:var(--text-heading);white-space:nowrap;}
.card-sep{color:var(--border-heavy);font-size:13px;}
.card-badge{
  padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500;
  background:var(--bg-opt-active);color:var(--text-secondary);display:flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.card-badge img{width:20px;height:20px;border-radius:4px;object-fit:cover;}
.card-badge.detail{display:none;}
@media(min-width:900px){.card-badge.detail{display:flex;}}
.card-prompt{
  padding:0 16px 12px;font-size:13px;color:var(--text-secondary);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;
}
.card-video{
  width:100%;aspect-ratio:16/9;background:var(--bg-video);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.card-video video{
  width:100%;height:100%;object-fit:contain;
  background:var(--bg-video-full);cursor:pointer;
}
.card-video .placeholder{font-size:13px;color:var(--text-placeholder);}
.card-video .video-error{font-size:12px;color:var(--accent-error);text-align:center;padding:12px;}
/* 로딩 스피너 */
.card-video .loading-spinner{
  width:36px;height:36px;border:3px solid var(--border-heavy);border-top-color:var(--accent-purple-mid);
  border-radius:50%;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.card-video .play-overlay{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 12px;
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--text-ccc);
  background:linear-gradient(transparent,var(--video-gradient));
  pointer-events:none;
}
.card-video .play-overlay *{pointer-events:auto;}
.card-video .play-btn{
  width:28px;height:28px;border-radius:50%;background:var(--play-btn-bg);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.card-video .play-btn:hover{background:var(--play-btn-hover);}
.card-video .play-btn svg{width:14px;height:14px;}
.card-video .video-time{font-size:11px;color:var(--text-ccc);flex:1;}
.card-video .video-controls-right{
  display:flex;align-items:center;gap:8px;color:var(--text-ccc);
}
.card-video .video-controls-right svg{width:18px;height:18px;cursor:pointer;opacity:.7;}
.card-video .video-controls-right svg:hover{opacity:1;}
.card-actions{
  padding:10px 16px;display:flex;align-items:center;gap:4px;border-top:1px solid var(--border-mid);
}
.card-actions-left{display:flex;align-items:center;gap:2px;}
.card-actions-right{margin-left:auto;display:flex;align-items:center;gap:2px;}
.card-action{
  width:32px;height:32px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--text-placeholder);transition:background .12s,color .12s;
}
.card-action:hover{background:var(--bg-opt-active);color:var(--text-chip);}
.card-action.green{color:var(--accent-green);}
.card-action-label{
  font-size:12px;color:var(--text-dim);padding:0 6px;display:flex;align-items:center;gap:4px;
  white-space:nowrap;
}
.card-action-label svg{width:14px;height:14px;flex-shrink:0;}
.card-action-label.green{color:var(--accent-green);}
.card-action-label span{display:none;}
@media(min-width:900px){.card-action-label span{display:inline;}}

/* ── 반응형 (데스크톱) ── */
@media(max-width:1200px){
  .left-panel{width:380px;min-width:320px;max-width:420px;}
}
@media(max-width:1000px){
  .left-panel{width:340px;min-width:280px;max-width:380px;padding:16px;gap:12px;}
  .right-panel{padding:16px;}
}
.card-action-sep{width:1px;height:16px;background:var(--border-main);margin:0 4px;}

.empty-state{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--text-placeholder);font-size:14px;
}

/* 스크롤바 */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px;}

/* ── 잠금(locked) 공통 ── */
[data-feature].locked{position:relative;opacity:.35;pointer-events:none;user-select:none;}
[data-feature].locked::after{
  content:'🔒';font-size:9px;position:absolute;top:2px;right:4px;
  pointer-events:none;line-height:1;
}

/* ── School Gallery Overlay ── */
.school-gallery-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:var(--overlay-dark);z-index:9999;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.school-gallery-overlay.open{opacity:1;pointer-events:auto;}
.sg-header{
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-bottom:1px solid var(--border-main);flex-shrink:0;
  background:var(--bg-card);
}
.sg-header h2{font-size:16px;font-weight:700;color:var(--text-heading);}
.sg-close{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-secondary);transition:all .15s;font-size:18px;
}
.sg-close:hover{background:var(--bg-opt-active);color:var(--text-primary);}
.sg-body{flex:1;overflow-y:auto;padding:24px;}
.sg-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;
}
.sg-card{
  background:var(--bg-card);border:1px solid var(--border-main);border-radius:12px;
  overflow:hidden;transition:border-color .15s;
}
.sg-card:hover{border-color:var(--border-hover);}
.sg-card video{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg-video-full);}
.sg-card-info{padding:10px 12px;}
.sg-card-prompt{
  font-size:12px;color:var(--text-secondary);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.4;
}
.sg-card-meta{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:6px;font-size:11px;color:var(--text-subtle);
}
.sg-empty{
  text-align:center;padding:60px 20px;color:var(--text-subtle);font-size:14px;
}

/* ── 갤러리 피커 모달 ── */
.gallery-picker-overlay{position:fixed;inset:0;background:var(--overlay-mid);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.gallery-picker-overlay.open{opacity:1;}
.gallery-picker{background:var(--bg-active);border-radius:16px;width:92%;max-width:640px;max-height:75vh;display:flex;flex-direction:column;box-shadow:0 8px 32px var(--shadow-dropdown);overflow:hidden;}
.gallery-picker-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 8px;}
.gallery-picker-title{font-size:16px;font-weight:700;color:var(--text-heading);}
.gallery-picker-close{font-size:22px;color:var(--text-muted);cursor:pointer;padding:4px 8px;border-radius:6px;background:none;border:none;}
.gallery-picker-close:hover{color:var(--text-primary);background:var(--picker-close-hover);}
.gallery-picker-tabs{display:flex;gap:8px;padding:8px 20px 12px;}
.gp-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border-heavy);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:13px;transition:all .15s;}
.gp-tab:hover{border-color:var(--border-dim);color:var(--text-body);}
.gp-tab.active{background:var(--accent-purple-dark);color:#fff;border-color:var(--accent-purple-dark);}
.gallery-picker-scroll{flex:1;min-height:0;overflow-y:auto;padding:4px 20px 12px;}
.gallery-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.gp-item{position:relative;border-radius:8px;overflow:hidden;cursor:pointer;aspect-ratio:4/3;background:var(--bg-video);border:2px solid transparent;transition:border-color .15s;}
.gp-item:hover{border-color:var(--accent-purple-dark);}
.gp-item img{width:100%;height:100%;object-fit:cover;display:block;}
.gp-item-badge{position:absolute;top:4px;left:4px;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--badge-bg);color:#fff;pointer-events:none;}
.gp-item-prompt{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;font-size:10px;color:#fff;background:linear-gradient(transparent,var(--video-gradient-bottom));line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;pointer-events:none;}
.gallery-picker-empty{grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--text-subtle);font-size:13px;}
.gallery-picker-footer{padding:12px 20px;border-top:1px solid var(--picker-footer-border);text-align:center;}
.gp-upload-btn{padding:10px 24px;border-radius:8px;border:1px solid var(--border-focus);background:transparent;color:var(--text-body);cursor:pointer;font-size:13px;transition:all .15s;}
.gp-upload-btn:hover{border-color:var(--text-dim);color:var(--text-primary);background:var(--picker-upload-hover);}
</style>
</head>

/* ── Streamlit Component 프로토콜 ── */
function sendMsg(type, data) {
  window.parent.postMessage(Object.assign({isStreamlitMessage:true, type:type}, data), "*");
}

//   {id:"kling-v2-master", ver:"2.0", label:"비디오 모델 2.0 Master", desc:"마스터 품질 비디오 생성",         frameMode:"start_end"},

function buildFrameBox(type, label, sub, dataUrl) {
  if (dataUrl) {
    return '<div class="frame-upload has-image" data-frame="' + type + '">' +
      '<div class="frame-preview">' +
        '<img src="' + dataUrl + '">' +
        '<div class="frame-remove" data-frame="' + type + '">&times;</div>' +
      '</div>' +
    '</div>';
  }
  return '<div class="frame-upload" data-frame="' + type + '">' +
    '<div class="upload-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg></div>' +
    '<div class="label">' + label + '</div>' +
    '<div class="sub-label">' + sub + '</div>' +
  '</div>';
}

function bindFrameEvents() {
  document.querySelectorAll(".frame-upload").forEach(function(el) {
    var type = el.getAttribute("data-frame");

    // 클릭 → 갤러리 피커 또는 파일 선택
    el.addEventListener("click", function(e) {
      if (e.target.closest(".frame-remove")) return;
      if (sourceGallery && sourceGallery.length > 0) {
        showGalleryPicker(type);
      } else {
        var input = document.getElementById(type === "start" ? "fileStart" : "fileEnd");
        input.value = "";
        input.click();
      }
    });

    // 드래그&드롭
    el.addEventListener("dragover", function(e) { e.preventDefault(); el.classList.add("drag-over"); });
    el.addEventListener("dragleave", function() { el.classList.remove("drag-over"); });
    el.addEventListener("drop", function(e) {
      e.preventDefault();
      el.classList.remove("drag-over");
      var file = (e.dataTransfer.files || [])[0];
      if (file && file.type.startsWith("image/")) handleFile(type, file);
    });
  });

  // 삭제 버튼
  document.querySelectorAll(".frame-remove").forEach(function(btn) {
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      var type = btn.getAttribute("data-frame");
      if (type === "start") { startFrameData = null; autoRatio = null; updateRatioGroup(); updateChipText(); }
      else endFrameData = null;
      renderFrameSection();
    });
  });
}

function handleFile(type, file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    if (type === "start") {
      startFrameData = dataUrl;
      // 이미지에서 비율 자동 감지
      var img = new Image();
      img.onload = function() {
        var r = img.width / img.height;
        if (r > 1.4) autoRatio = "16:9";
        else if (r < 0.75) autoRatio = "9:16";
        else autoRatio = "1:1";
        updateRatioGroup();
        updateChipText();
      };
      img.src = dataUrl;
    } else {
      endFrameData = dataUrl;
    }
    renderFrameSection();
  };
  reader.readAsDataURL(file);
}

function updateRatioGroup() {
  var el = document.getElementById("spRatioGroup");
  if (!el) return;
  if (startFrameData) {
    // 이미지 첨부됨 → 비율 선택 숨기고 자동 감지 표시
    el.style.display = "none";
  } else {
    el.style.display = "";
    autoRatio = null;
  }
}

document.getElementById("fileStart").addEventListener("change", function() {

document.getElementById("fileEnd").addEventListener("change", function() {

/* ── 비디오 재생 컨트롤 이벤트 ── */
function bindVideoEvents() {
  document.querySelectorAll(".card-video video").forEach(function(vid) {
    var videoContainer = vid.closest(".card-video");
    var overlay = videoContainer.querySelector(".play-overlay");
    if (!overlay) return;

    var playBtn = overlay.querySelector("[data-action='playpause']");
    var timeEl = overlay.querySelector(".video-time");
    var muteBtn = overlay.querySelector("[data-action='mute']");
    var fsBtn = overlay.querySelector("[data-action='fullscreen']");

    function fmtTime(s) {
      var m = Math.floor(s / 60);
      var sec = Math.floor(s % 60);
      return String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
    }

    function updatePlayIcon() {
      if (playBtn) {
        playBtn.innerHTML = vid.paused
          ? '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>';
      }
    }

    // 클릭으로 재생/일시정지
    vid.addEventListener("click", function() {
      vid.paused ? vid.play() : vid.pause();
    });
    if (playBtn) {
      playBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        vid.paused ? vid.play() : vid.pause();
      });
    }
    vid.addEventListener("play", updatePlayIcon);
    vid.addEventListener("pause", updatePlayIcon);

    // 시간 표시 업데이트
    vid.addEventListener("timeupdate", function() {
      if (timeEl) {
        timeEl.textContent = fmtTime(vid.currentTime) + " / " + fmtTime(vid.duration || 0);
      }
    });
    vid.addEventListener("loadedmetadata", function() {
      if (timeEl) {
        timeEl.textContent = "00:00 / " + fmtTime(vid.duration || 0);
      }
    });

    // 음소거 토글
    if (muteBtn) {
      muteBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        vid.muted = !vid.muted;
        muteBtn.style.opacity = vid.muted ? "0.3" : "0.7";
      });
    }

    // 전체화면
    if (fsBtn) {
      fsBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        if (vid.requestFullscreen) vid.requestFullscreen();
        else if (vid.webkitRequestFullscreen) vid.webkitRequestFullscreen();
      });
    }

    // 에러 처리
    vid.addEventListener("error", function() {
      var parent = vid.parentElement;
      parent.innerHTML = '<div class="video-error">비디오를 불러올 수 없습니다</div>';
    });
  });

  // 다운로드 버튼 바인딩 (여러 비디오가 있으면 첫 번째 다운로드)
  document.querySelectorAll(".card-action[title='다운로드']").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var card = btn.closest(".result-card");
      var vids = card ? card.querySelectorAll("video") : [];
      vids.forEach(function(vid, idx) {
        if (vid && vid.src) {
          var a = document.createElement("a");
          a.href = vid.src;
          a.download = "kling_video_" + (idx + 1) + ".mp4";
          a.target = "_blank";
          a.click();
        }
      });
    });
  });
}

function completeLoading(id) {
  // mock: 더미 비디오 URL 생성 (실제 API 연동 시 교체)
  var mockSamples = [
    "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4",
    "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
    "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4",
    "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4"
  ];

  // count에 맞춰 video_urls 배열 생성
  var item = null;
  for (var i = 0; i < resultItems.length; i++) {
    if (resultItems[i].id === id) { item = resultItems[i]; break; }
  }
  var count = (item && item.count) || 1;
  var videoUrls = [];
  for (var j = 0; j < count; j++) {
    videoUrls.push(mockSamples[j % mockSamples.length]);
  }

  // Streamlit에 완료 알림 (video_urls 배열 포함)
  setComponentValue({
    action: "loading_complete",
    item_id: id,
    video_urls: videoUrls,
    ts: Date.now()
  });
}

/* ── 생성 버튼 ── */
var _generateLock = false;
document.getElementById("btnGenerate").addEventListener("click", function() {
  if (_generateLock) return;
  var prompt = document.getElementById("promptInput").value.trim();
  if (!prompt) return;
  _generateLock = true;
  var fm = FRAME_MODES[selectedFrameMode];
  var itemId = "gen_" + Date.now();
  var ratio = autoRatio || settings.ratio;
  var ts = Date.now();

  // 프레임 이미지 로컬 캐시 저장 (카드 뱃지 썸네일용)
  if (startFrameData || endFrameData) {
    _frameCache[itemId] = { start: startFrameData, end: endFrameData };
  }

  // Streamlit에 생성 요청 전달 → Python이 session에 저장 후 rerun → history로 돌아옴
  setComponentValue({
    action: "generate",
    item_id: itemId,
    prompt: prompt,
    model_id: "veo-3.1",
    model_ver: "3.1",
    model_label: "Veo 3.1",
    frame_mode: fm.id,
    start_frame: startFrameData || null,
    end_frame: endFrameData || null,
    sound_enabled: false,
    settings: {
      resolution: settings.resolution,
      duration: settings.duration,
      ratio: ratio,
      count: settings.count
    },
    ts: ts
  });
});

/* ── 갤러리 버튼 ── */
var assetsBtn = document.querySelector('[data-feature="kling.assets"]');
if (assetsBtn) {
  assetsBtn.addEventListener('click', function() {
    if (!this.classList.contains('locked')) {
      setComponentValue({action: 'open_gallery', ts: Date.now()});
    }
  });
}

/* ── 초기화 ── */
renderFrameModeDropdown();
renderFrameSection();
updateDurationLock();
updateSoundSection();
updateBottomBar();
updateCreditCost();
renderResults();

var _lastHistoryKey = "";

/* ── 잠금 판정 ── */
function applyFeatureLocks(enabledFeatures) {
  var featureSet = {};
  (enabledFeatures || []).forEach(function(f){ featureSet[f] = true; });
  document.querySelectorAll('[data-feature]').forEach(function(el){
    if (featureSet[el.getAttribute('data-feature')]) {
      el.classList.remove('locked');
    } else {
      el.classList.add('locked');
    }
  });
}

window.addEventListener("message", function(event) {
  if (event.data.type !== "streamlit:render") return;
  var args = event.data.args || {};
  sourceGallery = args.source_gallery || [];
  // 잠금 판정
  applyFeatureLocks(args.enabled_features || []);
  setFrameHeight(document.body.scrollHeight);

  // 학교 갤러리 데이터 처리
  var schoolGallery = args.school_gallery;
  if (schoolGallery && Array.isArray(schoolGallery)) {
    renderSchoolGallery(schoolGallery);
    document.getElementById('schoolGallery').classList.add('open');
  }

  // history 변경 감지용 키 생성 (id + loading + video_urls)
  var hist = args.history || [];
  var key = hist.map(function(h) {
    return (h.item_id || "") + "|" + (h.loading ? "1" : "0") + "|" + (h.video_urls || []).join(",");
  }).join(";;");

  // 변경 없으면 리렌더 스킵 (비디오 재생 상태 유지)
  if (key === _lastHistoryKey) return;
  _lastHistoryKey = key;
  _generateLock = false;

  // Python 세션에서 전달된 history → resultItems 재구성
  resultItems = [];
  for (var i = 0; i < hist.length; i++) {
    var h = hist[i];
    resultItems.push({
      id: h.item_id || ("hist_" + i),
      prompt: h.prompt || "",
      modelLabel: h.model_label || "",
      resolution: (h.settings && h.settings.resolution) || "1080p",
      duration: parseInt((h.settings && h.settings.duration) || "5"),
      ratio: (h.settings && h.settings.ratio) || "16:9",
      count: parseInt((h.settings && h.settings.count) || "1"),
      startFrame: h.has_start_frame ? ((_frameCache[h.item_id] && _frameCache[h.item_id].start) || h.start_frame_data || "thumb") : null,
      endFrame: h.has_end_frame ? ((_frameCache[h.item_id] && _frameCache[h.item_id].end) || h.end_frame_data || "thumb") : null,
      soundEnabled: h.sound_enabled || false,
      videoUrls: h.video_urls || [],
      loading: !!h.loading,
      loadingTs: h.loading_ts || 0
    });
  }
  renderResults();
  setupLoadingTimers(resultItems);
});

function setupLoadingTimers(items) {
  var activeTs = {};
  items.forEach(function(item) {
    if (!item.loading || !item.loadingTs) return;
    var ts = item.loadingTs;
    activeTs[ts] = true;
    if (_loadingTimers[ts]) return;
    var elapsed = Date.now() - ts;
    var remaining = Math.max(0, 10000 - elapsed);
    _loadingTimers[ts] = setTimeout(function() {
      delete _loadingTimers[ts];
      completeLoading(item.id);
    }, remaining);
  });
  // 이미 완료된 타이머 정리
  Object.keys(_loadingTimers).forEach(function(k) {
    if (!activeTs[k]) {
      clearTimeout(_loadingTimers[k]);
      delete _loadingTimers[k];
    }
  });
}

/* ── 학교 갤러리 렌더링 ── */
function renderSchoolGallery(items) {
  var grid = document.getElementById('sgGrid');
  var empty = document.getElementById('sgEmpty');
  grid.innerHTML = '';
  if (!items || items.length === 0) {
    empty.style.display = 'block';
    grid.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  grid.style.display = '';
  items.forEach(function(item) {
    var urls = item.video_urls || [];
    urls.forEach(function(videoUrl) {
      var card = document.createElement('div');
      card.className = 'sg-card';
      card.innerHTML =
        '<video src="' + videoUrl + '" controls preload="metadata"></video>' +
        '<div class="sg-card-info">' +
          '<div class="sg-card-prompt">' + (item.prompt || '').replace(/</g,'&lt;') + '</div>' +
          '<div class="sg-card-meta"><span>' + (item.user_id || '') + '</span><span>' + (item.model_label || '') + '</span></div>' +
        '</div>';
      grid.appendChild(card);
    });
  });
}

document.getElementById('sgClose').addEventListener('click', function() {
  document.getElementById('schoolGallery').classList.remove('open');
  setComponentValue({action: 'close_gallery', ts: Date.now()});
});

/* ═══════════════════════════════════════
   갤러리 피커 (생성 이미지에서 선택)
   ═══════════════════════════════════════ */
var sourceGallery = [];
var gpCurrentFilter = "all";
var currentPickerFrameType = "start";

function resolveToDataUrl(url, callback) {
  if (!url || url.startsWith("data:")) { callback(url); return; }
  fetch(url).then(function(r) { return r.blob(); }).then(function(blob) {
    var reader = new FileReader();
    reader.onload = function() { callback(reader.result); };
    reader.readAsDataURL(blob);
  }).catch(function() { callback(url); });
}

function showGalleryPicker(frameType) {
  currentPickerFrameType = frameType;
  gpCurrentFilter = "all";
  var overlay = document.getElementById("galleryPickerOverlay");
  overlay.style.display = "flex";
  requestAnimationFrame(function() { overlay.classList.add("open"); });
  renderPickerGrid(sourceGallery, "all");

  overlay.querySelectorAll(".gp-tab").forEach(function(btn) {
    btn.classList.toggle("active", btn.getAttribute("data-filter") === "all");
  });
}

function hideGalleryPicker() {
  var overlay = document.getElementById("galleryPickerOverlay");
  overlay.classList.remove("open");
  setTimeout(function() { overlay.style.display = "none"; }, 200);
}

function renderPickerGrid(items, filter) {
  var grid = document.getElementById("galleryPickerGrid");
  var filtered = filter === "all" ? items : items.filter(function(it) { return it.source === filter; });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="gallery-picker-empty">선택 가능한 이미지가 없습니다</div>';
    return;
  }

  grid.innerHTML = filtered.map(function(it, idx) {
    var badge = it.source === "mj" ? "MJ" : "NB";
    return '<div class="gp-item" data-gp-idx="' + idx + '">' +
      '<img src="' + it.url + '" loading="lazy">' +
      '<div class="gp-item-badge">' + badge + '</div>' +
      (it.prompt ? '<div class="gp-item-prompt">' + it.prompt.replace(/</g, '&lt;') + '</div>' : '') +
    '</div>';
  }).join("");

  grid.querySelectorAll(".gp-item").forEach(function(el, i) {
    el.addEventListener("click", function() {
      onGalleryImageSelect(filtered[i].url);
    });
  });
}

function onGalleryImageSelect(url) {
  resolveToDataUrl(url, function(dataUrl) {
    var type = currentPickerFrameType;
    if (type === "start") {
      startFrameData = dataUrl;
      var img = new Image();
      img.onload = function() {
        var r = img.width / img.height;
        if (r > 1.4) autoRatio = "16:9";
        else if (r < 0.75) autoRatio = "9:16";
        else autoRatio = "1:1";
        updateRatioGroup();
        updateChipText();
      };
      img.src = dataUrl;
    } else {
      endFrameData = dataUrl;
    }
    renderFrameSection();
    hideGalleryPicker();
  });
}

// 갤러리 피커 이벤트 바인딩
(function() {
  var overlay = document.getElementById("galleryPickerOverlay");
  if (!overlay) return;

  overlay.addEventListener("click", function(e) {
    if (e.target === overlay) hideGalleryPicker();
  });

  overlay.querySelector(".gallery-picker-close").addEventListener("click", hideGalleryPicker);

  overlay.querySelectorAll(".gp-tab").forEach(function(btn) {
    btn.addEventListener("click", function() {
      overlay.querySelectorAll(".gp-tab").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      gpCurrentFilter = btn.getAttribute("data-filter");
      renderPickerGrid(sourceGallery, gpCurrentFilter);
    });
  });

  document.getElementById("gpUploadBtn").addEventListener("click", function() {
    hideGalleryPicker();
    var type = currentPickerFrameType;
    var input = document.getElementById(type === "start" ? "fileStart" : "fileEnd");
    input.value = "";
    input.click();
  });
})();

init();
</script>
